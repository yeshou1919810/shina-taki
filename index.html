<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>雨宫莲应援页面</title>
     <style>
         * {
             margin: 0;
             padding: 0;
             box-sizing: border-box;
         }
         body {
             background-color: #f6f6f6;
             padding: 30px 20px;
         }
         .title {
             text-align: center;
             background: linear-gradient(90deg, #4361ee, #9333ea, #ef4444);
             background-size: 200% 100%;
             -webkit-background-clip: text;
             background-clip: text;
             color: transparent;
             font-size: 32px;
             margin-bottom: 20px;
             animation: flow 4s linear infinite;
         }
         @keyframes flow {
             0% { background-position: 0 0; }
             100% { background-position: 200% 0; }
         }
         .lian-img {
             max-width: 100%;
             width: 100%;
             border-radius: 12px;
             transition: transform 0.3s ease;
             box-shadow: 0 4px 15px rgba(0,0,0,0.15);
         }
         .lian-img:hover {
             transform: scale(1.02);
         }
         .tag {
             display: inline-block;
             color: #7e22ce;
             font-size: 15px;
             background: white;
             padding: 8px 14px;
             border-radius: 20px;
             box-shadow: 0 2px 6px rgba(0,0,0,0.1);
             margin-bottom: 25px;
         }
         .tag img {
             width: 22px;
             height: 22px;
             border-radius: 50%;
             vertical-align: middle;
             margin-left: 6px;
             object-fit: cover;
         }
         .center {
             text-align: center;
         }
     </style>
 </head>
 <body>
     <h1 class="title">怪盗团团长我们喜欢你</h1>
     <div class="center">
         <div class="tag">
             椎名立希诚意出品
             <a href="https://www.bilibili.com/bangumi/play/ss73077?spm_id_from=333.337.0.0" target="_blank">
                <img src="椎名立希.png" alt="头像">
            </a>
         </div>
     </div>
     <div class="center">
         <a href="https://ys.mihoyo.com/#/download" target="_blank">
             <img src="雨宫莲.png" alt="雨宫莲帅照" class="lian-img">
         </a>
     </div>
 </body>
 </html>
